<div class="City-Section">
    <div class="title-section">
        <h2 class="section-title">Esplora il Veneto</h2>
        <p class="section-description">
        Scopri le province del Veneto e le loro bellezze uniche attraverso la nostra mappa interattiva.
        </p>
    </div>
    <div class="section-container">
    <section class="map-gallery">
    <!-- Galleria a sinistra -->
    <aside class="gallery-column">
        <p class="gallery-description">
        Esplora le bellezze naturali e culturali della regione: dalle Dolomiti alle spiagge dell’Adriatico.
        </p>

        <div class="main-image">
        <img [src]="gallery[mainIndex].src" [alt]="gallery[mainIndex].alt" loading="lazy">
        </div>

        <div class="thumbs">
        <button *ngFor="let g of gallery; let i = index"
                class="thumb"
                [class.active]="i === mainIndex"
                (click)="selectImage(i)">
            <img [src]="g.src" [alt]="g.alt" loading="lazy">
        </button>
        </div>

        
    </aside>
    <!-- New buttons at the bottom -->
        <div class="gallery-actions">
            <button class="action-btn" (click)="viewCities()">View Cities</button>
            <button class="action-btn" (click)="learnMore()">Learn More</button>
        </div>
    </section>
    <section class="map-with-cities" aria-label="Mappa con elenco città">
    
        <aside class="city-column" aria-label="Elenco città">
        <ul class="city-list" role="list">
        <li *ngFor="let c of cities" role="listitem">
            <button
            class="city-btn"
            [class.active]="c.id === selectedProvince"
            (click)="selectProvince(c.id)"
            (keydown)="onCityKey($event, c.id)"
            [attr.aria-pressed]="c.id === selectedProvince"
            >
            {{ c.label }}
            </button>
        </li>
        </ul>
    </aside>
